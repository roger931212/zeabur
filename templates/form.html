<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上傳尿布疹照片</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .upload-icon {
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .liff-status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .liff-ok {
            background: #d4edda;
            color: #155724;
        }

        .liff-err {
            background: #f8d7da;
            color: #721c24;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: 0.15em;
        }
    </style>
</head>

<body>
    <div class="upload-card">
        <div class="upload-icon">🩹</div>
        <h2 class="text-center mb-4">上傳尿布疹照片</h2>
        <p class="text-center text-muted mb-4">請填寫以下資訊以獲取 AI 分析</p>

        <!-- LIFF 狀態指示 -->
        <div id="liffStatus" class="liff-status" style="display:none;"></div>

        <form id="uploadForm" action="/submit_case" method="post" enctype="multipart/form-data">

            <!-- LIFF Token（隱藏欄位，由 LIFF SDK 自動填入） -->
            <input type="hidden" name="liff_id_token" id="liff_id_token">
            <input type="hidden" name="liff_access_token" id="liff_access_token">

            <div class="mb-3">
                <label for="name" class="form-label">家長/監護人姓名</label>
                <input type="text" class="form-control" id="name" name="name" required placeholder="請輸入您的姓名">
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">電話號碼</label>
                <input type="tel" class="form-control" id="phone" name="phone" required placeholder="例如 0912345678">
            </div>

            <div class="mb-4">
                <label for="image" class="form-label">患部照片</label>
                <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
                <small class="text-muted">JPG、PNG 格式，最大 8MB</small>
            </div>

            <div class="d-grid">
                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg btn-submit">
                    提交進行分析
                </button>
            </div>
        </form>

        <div class="text-center mt-4">
            <small class="text-muted">
                您的隱私受到保護。影像將在安全環境中進行分析。
            </small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- LINE LIFF SDK -->
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
        // 由後端環境變數 LIFF_ID 注入
        var LIFF_ID = "{{ liff_id or '' }}";

        (function initLiff() {
            if (!window.location.pathname.startsWith("/form")) {
                return;
            }

            var statusEl = document.getElementById("liffStatus");
            var submitBtn = document.getElementById("submitBtn");
            var idTokenEl = document.getElementById("liff_id_token");
            var accessTokenEl = document.getElementById("liff_access_token");

            function setStatus(message, ok) {
                statusEl.textContent = message;
                statusEl.className = ok ? "liff-status liff-ok" : "liff-status liff-err";
                statusEl.style.display = "block";
            }

            function setReady(ready) {
                submitBtn.disabled = !ready;
            }

            setReady(false);
            if (!LIFF_ID) {
                setStatus("系統尚未設定 LIFF_ID，請聯繫管理員。", false);
                return;
            }
            if (typeof liff === "undefined") {
                setStatus("LINE LIFF SDK 載入失敗，請稍後再試。", false);
                return;
            }

            liff.init({ liffId: LIFF_ID })
                .then(function () {
                    if (!liff.isLoggedIn()) {
                        liff.login({ redirectUri: window.location.href });
                        return;
                    }

                    var idToken = liff.getIDToken();
                    var accessToken = liff.getAccessToken();
                    if (!idToken || !accessToken) {
                        throw new Error("missing_liff_tokens");
                    }

                    idTokenEl.value = idToken;
                    accessTokenEl.value = accessToken;
                    setStatus("已完成 LINE 登入驗證。", true);
                    setReady(true);
                })
                .catch(function (err) {
                    console.error("LIFF init error:", err && err.message ? err.message : err);
                    setStatus("LINE 驗證失敗，請從 LINE 內重新開啟此頁面。", false);
                    setReady(false);
                });
        })();

        // ============================
        // 防抖機制：防止重複提交
        // ============================
        (function setupDebounce() {
            var form = document.getElementById("uploadForm");
            var btn = document.getElementById("submitBtn");
            var submitted = false;

            form.addEventListener("submit", function (e) {
                // 防止重複提交
                if (submitted) {
                    e.preventDefault();
                    return;
                }

                var idToken = document.getElementById("liff_id_token").value;
                var accessToken = document.getElementById("liff_access_token").value;
                if (!idToken || !accessToken) {
                    e.preventDefault();
                    alert("尚未完成 LINE 驗證，請確認您是從 LINE 應用程式中開啟此頁面。");
                    return;
                }

                submitted = true;
                btn.disabled = true;
                btn.innerHTML =
                    '<span class="spinner-border spinner-border-sm me-2" role="status"></span>提交中，請稍候...';
            });
        })();
    </script>

</body>

</html>
